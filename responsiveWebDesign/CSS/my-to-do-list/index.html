<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>My To-Do List</h1>
        <ul class="todo-list">
            <li>
                <div class="to-do-general">
                    <input id="unique01" type="checkbox">
                    <label for="unique01">Revisar mi GitHub</label>
                    <ul class="sub-item">
                        <li><a class="sub-item-link" href="#" target="_blank">Ir a mi perfil</a></li>
                    </ul>
                </div>
            </li>
            <li>
                <div class="to-do-general">
                    <input id="unique02" type="checkbox">
                    <label for="unique02">Revisar mi correo</label>
                    <ul class="sub-item">
                        <li><a class="sub-item-link" href="#" target="_blank">Ir a mi correo</a></li>
                    </ul>
                </div>
            </li>
            <li>
                <div class="to-do-general">
                    <input id="unique03" type="checkbox">
                    <label for="unique03">Ver nuevas postulaciones a LinkedIn</label>
                    <ul class="sub-item">
                        <li><a class="sub-item-link" href="#" target="_blank">Ir a LinkedIn</a></li>
                    </ul>
                </div>
            </li>
            <li>
                <div class="to-do-general">
                    <input id="unique04" type="checkbox">
                    <label for="unique04">Hacer correcciones en mi CV</label>
                    <ul class="sub-item">
                        <li><a class="sub-item-link" href="#" target="_blank">Ir a mi CV</a></li>
                    </ul>
                </div>
            </li>
        </ul>
    </div>
</body>

</html>
